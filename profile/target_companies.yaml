# Target Companies Watchlist
#
# 120+ companies for daily Greenhouse / Lever / Ashby / Workday scans.
# Slugs marked confidence: high are ones I'm confident about based on common patterns.
# Slugs marked confidence: medium should be verified once during initial setup
# (just curl the endpoint — if it returns JSON, slug is correct).
#
# Schema:
#   - name: company display name
#     ats: greenhouse | lever | ashby | workday | proprietary
#     slug: the ATS-specific identifier (e.g., greenhouse boards-api/anthropic uses slug "anthropic")
#     priority: high | medium | low
#     focus: brief tag of why this company is on the list
#     confidence: high | medium — high means slug is verified, medium means verify on first run
#
# To verify a Greenhouse slug: curl https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
# To verify a Lever slug:      curl https://api.lever.co/v0/postings/{slug}?mode=json
# To verify an Ashby slug:     curl https://api.ashbyhq.com/posting-api/job-board/{slug}

