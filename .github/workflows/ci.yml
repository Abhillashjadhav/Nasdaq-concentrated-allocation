name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Eval + golden-case suite
        run: pytest -q

      - name: Secret scan (fail on hardcoded tokens/keys)
        run: |
          patterns=(
            # key: "value" assignments where key looks credential-ish
            "(api[_-]?key|secret|token|password|passwd|credential)[\"']?[[:space:]]*[:=][[:space:]]*[\"'][A-Za-z0-9_+/-]{16,}"
            # known vendor token value prefixes, scanned regardless of key name
            "(apify_api_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|xox[baprs]-[A-Za-z0-9-]{10,})"
          )
          found=0
          for p in "${patterns[@]}"; do
            # exclude this scanner file itself; secrets belong in GitHub Secrets, never workflow YAML
            if grep -rniI -E "$p" \
                --include='*.py' --include='*.json' --include='*.yaml' --include='*.yml' \
                --include='*.toml' --include='*.cfg' --include='*.ini' --include='*.env*' \
                --exclude='ci.yml' --exclude-dir=.git . ; then
              found=1
            fi
          done
          if [ "$found" -ne 0 ]; then
            echo "::error::Possible hardcoded secret detected"
            exit 1
          fi
          echo "No hardcoded secrets found"
