name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Eval + golden-case suite
        run: pytest -q

      - name: Secret scan (fail on hardcoded tokens/keys)
        run: |
          if grep -rniI -E "(api[_-]?key|secret|token)['\"]?\s*[:=]\s*['\"][A-Za-z0-9_]{16,}" \
              --include='*.py' --include='*.json' --include='*.yaml' --include='*.yml' \
              --exclude-dir=.git . ; then
            echo "::error::Possible hardcoded secret detected"
            exit 1
          fi
          echo "No hardcoded secrets found"
