name: Weekly Eval — Trajectory Scoring + Apply Feedback + Calibration

on:
  schedule:
    # Sunday 14:30 UTC = Sunday 20:00 IST per eval/README.md spec.
    - cron: '30 14 * * 0'
  workflow_dispatch:
    inputs:
      week:
        description: 'ISO week label (e.g. 2026-W20). Defaults to the current week.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  weekly-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI (uses Max-plan OAuth)
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version || true

      - name: Resolve week label
        id: wk
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            echo "WEEK=${{ github.event.inputs.week }}" >> $GITHUB_OUTPUT
          else
            Y=$(date -u +%G)
            W=$(date -u +%V)
            echo "WEEK=${Y}-W${W}" >> $GITHUB_OUTPUT
          fi
          echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "WEEK_START=$(date -u -d '6 days ago' +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Pull all daily-runs branches into outputs/
        # The eval scripts read outputs/{date}/trajectory.jsonl etc. Pull the
        # past 7 days' worth of daily-runs branches into the local checkout
        # so the eval has data to score.
        run: |
          set -euo pipefail
          for delta in 0 1 2 3 4 5 6; do
            d=$(date -u -d "$delta days ago" +%Y-%m-%d)
            branch="claude/daily-runs/${d}"
            if git ls-remote --heads origin "$branch" | grep -q "$branch"; then
              echo "Pulling $branch into outputs/${d}/"
              git fetch origin "$branch" 2>/dev/null || continue
              git checkout origin/"$branch" -- "outputs/${d}/" 2>/dev/null || true
            fi
          done

      - name: Task A — Trajectory eval (LLM-as-judge)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          python eval/trajectory_eval.py \
              --week "${{ steps.wk.outputs.WEEK }}" \
              --start "${{ steps.wk.outputs.WEEK_START }}" \
              --end "${{ steps.wk.outputs.TODAY }}"

      - name: Task B — Apply feedback ingestion (Gmail labels → applications.jsonl)
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          python eval/apply_feedback.py || echo "Apply feedback skipped/failed (continuing)"

      - name: Task C — Calibration proposals (gated on 30+ labels, 4+ weeks)
        run: |
          mkdir -p eval/eval_results/${{ steps.wk.outputs.WEEK }}
          python eval/calibration.py \
              --week "${{ steps.wk.outputs.WEEK }}" \
              --weeks_elapsed 99 \
              --end_date "${{ steps.wk.outputs.TODAY }}" \
              --out "eval/eval_results/${{ steps.wk.outputs.WEEK }}/calibration_proposals.json" \
            || echo "Calibration skipped (insufficient data)"

      - name: Commit + push eval results to claude/eval/{week} branch
        run: |
          git config user.name 'dreamjob-agent[bot]'
          git config user.email '[email protected]'
          BRANCH="claude/eval/${{ steps.wk.outputs.WEEK }}"
          git checkout -B "$BRANCH"
          git add eval/eval_results/ outputs/applications.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "weekly-eval: ${{ steps.wk.outputs.WEEK }}"
            for delay in 2 4 8 16; do
              if git push -f -u origin "$BRANCH" 2>&1; then
                echo "Push OK"; break
              fi
              echo "Retry in ${delay}s..."
              sleep $delay
            done
          fi

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-eval-${{ steps.wk.outputs.WEEK }}
          path: |
            eval/eval_results/${{ steps.wk.outputs.WEEK }}/
            outputs/applications.jsonl
          if-no-files-found: warn
          retention-days: 90
